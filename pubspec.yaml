name: chop_gang
description: A Very Good Project created by Very Good CLI.
version: 1.0.0+1
publish_to: none

environment:
  sdk: ^3.11.0
  flutter: ^3.41.0

dependencies:
  bloc: ^9.2.0
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  flutter_localizations:
    sdk: flutter
  flutter_svg: ^2.2.4
  go_router: ^17.2.1
  intl: ^0.20.2

dev_dependencies:
  bloc_lint: ^0.4.1
  bloc_test: ^10.0.0
  bloc_tools: ^0.1.0-dev.24
  build_runner: ^2.13.1
  flutter_launcher_icons: ^0.14.4
  flutter_test:
    sdk: flutter
  go_router_builder: ^4.2.1
  mocktail: ^1.0.5
  very_good_analysis: ^10.2.0

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/images/
    - assets/svgs/

  fonts:
    - family: Nectarine DEMO
      fonts:
        - asset: fonts/nectarine-demo.regular.otf
    - family: Supreme
      fonts:
        - asset: fonts/Supreme-Regular.otf
        - asset: fonts/Supreme-Bold.otf
        - asset: fonts/Supreme-Medium.otf
        - asset: fonts/Supreme-Light.otf
        - asset: fonts/Supreme-Italic.otf
